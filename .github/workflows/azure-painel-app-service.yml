# Publica o painel interno num Azure App Service (Linux + Node).
# Pré-requisito: App Service já criado (ex.: infra/azure/deploy-painel-app-service.ps1 uma vez).
#
# Segredos:
#   AZURE_WEBAPP_PUBLISH_PROFILE  — XML completo de "Download publish profile" (App Service → Overview)
#   AZURE_WEBAPP_NAME              — nome do App Service (ex.: app-painel-procon-xyz)
#
# Nota: azure/webapps-deploy@v3 pode falhar com "No credentials found" mesmo com publish profile;
# este workflow usa @v2, que continua a aceitar só publish profile + app-name.
#   PAINEL_VITE_API_BASE_URL
#   PAINEL_VITE_ADMIN_PANEL_TOKEN  — opcional
#   PAINEL_VITE_AZURE_CLIENT_ID    — opcional (login MSAL no painel)
#   PAINEL_VITE_AZURE_TENANT_ID    — opcional
#   PAINEL_VITE_AZURE_REDIRECT_URI — opcional (ex.: https://app-painel-xxx.azurewebsites.net/)

name: Deploy painel App Service

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "painel-interno/**"
      - ".github/workflows/azure-painel-app-service.yml"

concurrency:
  group: deploy-painel-appservice-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: painel-interno/package-lock.json

      - name: Build Vite e empacotar para App Service
        env:
          VITE_API_BASE_URL: ${{ secrets.PAINEL_VITE_API_BASE_URL }}
          VITE_ADMIN_PANEL_TOKEN: ${{ secrets.PAINEL_VITE_ADMIN_PANEL_TOKEN }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.PAINEL_VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.PAINEL_VITE_AZURE_TENANT_ID }}
          VITE_AZURE_REDIRECT_URI: ${{ secrets.PAINEL_VITE_AZURE_REDIRECT_URI }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_API_BASE_URL:-}" ]; then
            echo "::error::Defina o segredo PAINEL_VITE_API_BASE_URL (URL do Container App, sem barra final)."
            exit 1
          fi
          cd painel-interno
          npm ci
          npm run build
          mkdir -p _deploy/dist
          cp -r dist/* _deploy/dist/
          cp azure-app-service-host/package.json azure-app-service-host/server.mjs _deploy/
          cd _deploy
          npm install --omit=dev
          zip -r "$GITHUB_WORKSPACE/painel-app-service.zip" .

      - name: Verificar segredos do App Service
        shell: bash
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_WEBAPP_PUBLISH_PROFILE:-}" ]; then
            echo "::error::Segredo AZURE_WEBAPP_PUBLISH_PROFILE vazio ou inexistente. Portal → App Service → Get publish profile → copie o ficheiro .PublishSettings (XML) inteiro para GitHub → Settings → Secrets."
            exit 1
          fi
          if [ -z "${AZURE_WEBAPP_NAME:-}" ]; then
            echo "::error::Segredo AZURE_WEBAPP_NAME vazio. Use o nome exacto do Web App (ex. app-painel-procon-abp6-0420)."
            exit 1
          fi

      - name: Deploy para Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: painel-app-service.zip
