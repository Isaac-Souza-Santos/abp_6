# Deploy do painel interno (React) para Azure Static Web Apps.
#
# Pré-requisitos no GitHub (Settings → Secrets and variables → Actions):
#   AZURE_STATIC_WEB_APPS_API_TOKEN  → token do recurso SWA (Deployment token)
#   PAINEL_VITE_API_BASE_URL         → ex.: https://procon-bot.xxx.azurecontainerapps.io
#   PAINEL_VITE_ADMIN_PANEL_TOKEN    → mesmo valor que ADMIN_PANEL_TOKEN no Container App (opcional)
#   PAINEL_VITE_AZURE_CLIENT_ID / PAINEL_VITE_AZURE_TENANT_ID / PAINEL_VITE_AZURE_REDIRECT_URI → opcional (MSAL)
#
# No Portal Azure (Static Web App → Authentication):
#   - Habilitar Microsoft (Entra ID) e restringir ao tenant da organização, se desejado.
#
# Deploy em push desativado: a action v1 constrói uma imagem Docker a partir do MCR
# (mcr.microsoft.com/appsvc/staticappsclient) e em alguns ambientes o pull devolve 403.
# O painel em produção neste repo usa sobretudo App Service (workflow azure-painel-app-service.yml).
# Para publicar em SWA: Actions → "Deploy painel interno (SWA)" → Run workflow.

name: Deploy painel interno (SWA)

on:
  workflow_dispatch:

concurrency:
  group: deploy-painel-swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build e publicar painel
    env:
      VITE_API_BASE_URL: ${{ secrets.PAINEL_VITE_API_BASE_URL }}
      VITE_ADMIN_PANEL_TOKEN: ${{ secrets.PAINEL_VITE_ADMIN_PANEL_TOKEN }}
      VITE_AZURE_CLIENT_ID: ${{ secrets.PAINEL_VITE_AZURE_CLIENT_ID }}
      VITE_AZURE_TENANT_ID: ${{ secrets.PAINEL_VITE_AZURE_TENANT_ID }}
      VITE_AZURE_REDIRECT_URI: ${{ secrets.PAINEL_VITE_AZURE_REDIRECT_URI }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: painel-interno
          api_location: ""
          output_location: dist
          skip_app_build: false
