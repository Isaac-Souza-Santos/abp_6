name: reusable-node-validate

on:
  workflow_call:
    inputs:
      node_version:
        description: "Versao do Node.js para validacao"
        required: false
        type: string
        default: "20"
      upload_coverage:
        description: "Publica lcov no Codecov ao fim dos testes"
        required: false
        type: boolean
        default: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar lint
        run: npm run lint

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes
        run: npm test

      - name: Upload coverage reports
        if: ${{ inputs.upload_coverage }}
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build project
        run: npm run build
